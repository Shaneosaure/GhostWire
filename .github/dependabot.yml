version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "rust"
    groups:
      cargo-dependencies:
        patterns:
          - "*"
        update-types:
          - "patch"
      cargo-dependencies-major:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "major"
    ignore:
      - dependency-name: "sha2"
        versions: [">=0.11"]
      - dependency-name: "hkdf"
        versions: [">=0.13"]
