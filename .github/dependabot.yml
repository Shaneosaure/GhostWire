version: 2
updates:
  - package-ecosystem: "cargo" # Indique à Dependabot que c'est un projet Rust
    directory: "/"             # Pointe vers la racine où se trouve le Cargo.toml global
    schedule:
      interval: "weekly"       # Vérifie les mises à jour une fois par semaine
      day: "monday"            # (Optionnel) Le jour de la vérification

    # Ajoute automatiquement ces labels aux Pull Requests pour plus de clarté
    labels:
      - "dependencies"
      - "rust"

    # ASTUCE CRUCIALE POUR TON WORKSPACE RUST :
    # Grouper les mises à jour pour éviter le spam de Pull Requests.
    groups:
      cargo-dependencies:
        patterns:
          - "*"
